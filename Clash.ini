# Clash Meta 配置文件 (精簡分流 + 完整規則)
# SubConverter 兼容格式
# 最後更新：2026-03-15
# 規則每日自動更新 (86400 秒)

# ------------------------------------------------------------
# 基礎配置
mixed-port: 7890
allow-lan: true
mode: rule
log-level: info
external-controller: 0.0.0.0:9090

# DNS 配置
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - 223.5.5.5
    - 8.8.8.8

# ------------------------------------------------------------
# Proxy Groups（代理群組）
proxy-groups:
  - name: 🚀 Global
    type: select
    proxies:
      - ♻️ AUTO
      - 🇭🇰 香港节点
      - 🇹🇼 台湾节点
      - 🇸🇬 狮城节点
      - 🇯🇵 日本节点
      - 🇺🇲 美国节点
      - 🇰🇷 韩国节点
      - 🇲🇾 马来西亚节点
      - DIRECT

  - name: 🎥 Media
    type: select
    proxies:
      - 🚀 Global
      - ♻️ AUTO
      - 🇭🇰 香港节点
      - 🇹🇼 台湾节点
      - 🇸🇬 狮城节点
      - 🇯🇵 日本节点
      - 🇺🇲 美国节点
      - 🇰🇷 韩国节点
      - 🇲🇾 马来西亚节点
      - DIRECT

  - name: 🤖 AI
    type: select
    proxies:
      - 🚀 Global
      - ♻️ AUTO
      - 🇭🇰 香港节点
      - 🇹🇼 台湾节点
      - 🇸🇬 狮城节点
      - 🇯🇵 日本节点
      - 🇺🇲 美国节点
      - 🇰🇷 韩国节点
      - 🇲🇾 马来西亚节点
      - DIRECT

  - name: Telegram
    type: select
    proxies:
      - 🚀 Global
      - ♻️ AUTO
      - 🇭🇰 香港节点
      - 🇹🇼 台湾节点
      - 🇸🇬 狮城节点
      - 🇯🇵 日本节点
      - 🇺🇲 美国节点
      - 🇰🇷 韩国节点
      - 🇲🇾 马来西亚节点
      - DIRECT

  - name: 🐟 Final
    type: select
    proxies:
      - 🚀 Global
      - ♻️ AUTO
      - DIRECT
      - 🇭🇰 香港节点
      - 🇹🇼 台湾节点
      - 🇸🇬 狮城节点
      - 🇯🇵 日本节点
      - 🇺🇲 美国节点
      - 🇰🇷 韩国节点
      - 🇲🇾 马来西亚节点

  - name: ♻️ AUTO
    type: url-test
    proxies:
      - 🇭🇰 香港节点
      - 🇸🇬 狮城节点
      - 🇯🇵 日本节点
      - 🇰🇷 韩国节点
      - 🇹🇼 台湾节点
      - 🇺🇲 美国节点
      - 🇲🇾 马来西亚节点
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: 🇭🇰 香港节点
    type: url-test
    proxies: []
    filter: "(🇭🇰|港|HK|hk|Hong Kong|HongKong|hongkong|HKG)"
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: 🇯🇵 日本节点
    type: url-test
    proxies: []
    filter: "(🇯🇵|日本 | 川日 | 东京 | 大阪 | 泉日 | 埼玉 | 沪日 | 深日 | [^-] 日|JP|Japan|Tokyo|NRT|KIX)"
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: 🇺🇲 美国节点
    type: url-test
    proxies: []
    filter: "(🇺🇲|美 | 波特兰 | 达拉斯 | 俄勒冈 | 凤凰城 | 费利蒙 | 硅谷 | 拉斯维加斯 | 洛杉矶 | 圣何塞 | 圣克拉拉 | 西雅图 | 芝加哥|US|United States|ATL|BUF|DFW|EWR|IAD|LAX|MCI|MIA|ORD|PHX|PDX|SEA|SJC)"
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 150

  - name: 🇹🇼 台湾节点
    type: url-test
    proxies: []
    filter: "(🇹🇼|台 | 新北 | 彰化|TW|Taiwan|TPE|KHH)"
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: 🇸🇬 狮城节点
    type: url-test
    proxies: []
    filter: "(🇸🇬|新加坡 | 坡 | 狮城|SG|Singapore|SIN)"
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: 🇰🇷 韩国节点
    type: url-test
    proxies: []
    filter: "(🇰🇷|KR|Korea|KOR|Seoul|首尔 | 春川 | 韩 | 韓|ICN)"
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: 🇲🇾 马来西亚节点
    type: url-test
    proxies: []
    filter: "(🇲🇾|马来西亚 | 馬來西亞 | 吉隆坡|MY|Malaysia|KUL)"
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

