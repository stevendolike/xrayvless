# Clash Meta / Mihomo 配置文件 (2026 更新版)
# 最後更新：2026-03-15
# 參考：Kwisma/cf-worker-mihomo

# ------------------------------------------------------------
# 錨點區
proxy: &proxy { type: select, include-all: true, proxies: [🚀 Global, 🎯 全球直连, ♻️ AUTO, 🇭🇰 Hong Kong, 🇯🇵 Japan, 🇰🇷 Korea, 🇸🇬 Singapore, 🇹🇼 Taiwan, 🇺🇲 United States, 🇲🇾 Malaysia] }
direct: &direct { type: select, include-all: true, proxies: [🎯 全球直连, 🚀 Global, ♻️ AUTO, 🇭🇰 Hong Kong, 🇯🇵 Japan, 🇰🇷 Korea, 🇸🇬 Singapore, 🇹🇼 Taiwan, 🇺🇲 United States, 🇲🇾 Malaysia] }
ipcidr_mrs: &ipcidr_mrs { type: http, interval: 86400, behavior: ipcidr, format: mrs, proxy: 🎯 全球直连 }
domain_mrs: &domain_mrs { type: http, interval: 86400, behavior: domain, format: mrs, proxy: 🎯 全球直连 }

# 延遲檢測配置
p: &p
  type: http
  interval: 3600
  size-limit: 0
  header:
    User-Agent:
      - meta;clash.meta;Clash/v1.18.0;clash
  health-check:
    enable: true
    url: https://www.gstatic.com/generate_204
    interval: 300
    timeout: 5000
    lazy: true

# URL 測試配置
u: &u
  type: url-test
  tolerance: 1
  strategy: consistent-hashing
  url: https://www.gstatic.com/generate_204
  interval: 300
  lazy: true
  timeout: 5000
  max-failed-times: 5
  include-all: true

# ------------------------------------------------------------
# 基礎配置
mixed-port: 7890
allow-lan: true
mode: rule
log-level: info
external-controller: 0.0.0.0:9090

# Geo 數據庫
geodata-mode: false
geodata-loader: memconservative
geox-url:
  geoip: "https://jsd.onmicrosoft.cn/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
  geosite: "https://jsd.onmicrosoft.cn/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
  mmdb: "https://jsd.onmicrosoft.cn/gh/MetaCubeX/meta-rules-dat@release/geoip.metadb"
  asn: "https://jsd.onmicrosoft.cn/gh/MetaCubeX/meta-rules-dat@release/GeoLite2-ASN.mmdb"

# DNS 配置
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  cache-algorithm: arc
  default-nameserver:
    - 223.5.5.5
    - 8.8.8.8
  nameserver:
    - "https://doh.cmliussss.net/CMLiussss"
  proxy-server-nameserver:
    - "https://doh.cmliussss.net/CMLiussss"
  direct-nameserver:
    - "quic://dns.alidns.com"

# TUN 配置
tun:
  enable: true
  stack: gvisor
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53
    - tcp://any:53
  device: mihomo
  mtu: 1500
  strict-route: true

# 配置文件
profile:
  store-selected: true
  store-fake-ip: true

# ------------------------------------------------------------
# Proxy Groups（代理群組）
proxy-groups:
  # 主選擇群組
  - { name: 🚀 Global, type: select, proxies: [♻️ AUTO, 🇭🇰 Hong Kong, 🇯🇵 Japan, 🇰🇷 Korea, 🇸🇬 Singapore, 🇹🇼 Taiwan, 🇺🇲 United States, 🇲🇾 Malaysia, ☑️ SELECT, 🎯 全球直连] }

  - { name: 🎥 Media, type: select, proxies: [🚀 Global, ♻️ AUTO, 🇭🇰 Hong Kong, 🇯🇵 Japan, 🇰🇷 Korea, 🇸🇬 Singapore, 🇹🇼 Taiwan, 🇺🇲 United States, 🇲🇾 Malaysia, ☑️ SELECT, 🎯 全球直连] }

  - { name: 🤖 OpenAi, type: select, proxies: [🚀 Global, ♻️ AUTO, 🇭🇰 Hong Kong, 🇯🇵 Japan, 🇰🇷 Korea, 🇸🇬 Singapore, 🇹🇼 Taiwan, 🇺🇲 United States, 🇲🇾 Malaysia, ☑️ SELECT, 🎯 全球直连] }

  - { name: 🐟 Final, type: select, proxies: [🚀 Global, ♻️ AUTO, 🎯 全球直连, 🇭🇰 Hong Kong, 🇯🇵 Japan, 🇰🇷 Korea, 🇸🇬 Singapore, 🇹🇼 Taiwan, 🇺🇲 United States, 🇲🇾 Malaysia, ☑️ SELECT] }

  - { name: ☑️ SELECT, type: select, include-all: true, filter: ".*" }

  # 自動選擇
  - { name: ♻️ AUTO, <<: *u, type: url-test, tolerance: 50, proxies: [🇭🇰 Hong Kong, 🇯🇵 Japan, 🇰🇷 Korea, 🇸🇬 Singapore, 🇹🇼 Taiwan, 🇺🇲 United States, 🇲🇾 Malaysia] }

  # 隱藏式地區分組
  - { name: 🇭🇰 Hong Kong, <<: *u, hidden: true, filter: "(🇭🇰|港|HK|hk|Hong Kong|HongKong|hongkong|HKG)" }
  - { name: 🇯🇵 Japan, <<: *u, hidden: true, filter: "(🇯🇵|日本 | 川日 | 东京 | 大阪 | 泉日 | 埼玉 | 沪日 | 深日 | [^-] 日|JP|Japan|Tokyo|NRT|KIX)" }
  - { name: 🇰🇷 Korea, <<: *u, hidden: true, filter: "(🇰🇷|KR|Korea|KOR|Seoul|首尔 | 春川 | 韩 | 韩|ICN)" }
  - { name: 🇸🇬 Singapore, <<: *u, hidden: true, filter: "(🇸🇬|新加坡 | 坡 | 狮城|SG|Singapore|SIN)" }
  - { name: 🇹🇼 Taiwan, <<: *u, hidden: true, filter: "(🇹🇼|台 | 新北 | 彰化|TW|Taiwan|TPE|KHH)" }
  - { name: 🇺🇲 United States, <<: *u, hidden: true, filter: "(🇺🇲|美 | 波特兰 | 达拉斯 | 俄勒冈 | 凤凰城 | 费利蒙 | 硅谷 | 拉斯韦加斯 | 洛杉矶 | 圣何塞 | 圣克拉拉 | 西雅图 | 芝加哥|US|United States|ATL|BUF|DFW|EWR|IAD|LAX|MCI|MIA|ORD|PHX|PDX|SEA|SJC)" }
  - { name: 🇲🇾 Malaysia, <<: *u, hidden: true, filter: "(🇲🇾|马来西亚 | 馬來西亞 | 吉隆坡|MY|Malaysia|KUL)" }

# ------------------------------------------------------------
# Rule Providers（規則提供者）
rule-providers:
  # 廣告攔截
  ban-ad:
    <<: *domain_mrs
    url: "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanAD.list"
    path: ./ruleset/ban-ad.mrs

  ban-program-ad:
    <<: *domain_mrs
    url: "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanProgramAD.list"
    path: ./ruleset/ban-program-ad.mrs

  # 直連規則
  lan:
    <<: *domain_mrs
    url: "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list"
    path: ./ruleset/lan.mrs

  google-cn:
    <<: *domain_mrs
    url: "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/GoogleCN.list"
    path: ./ruleset/google-cn.mrs

  apple:
    <<: *domain_mrs
    url: "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Apple.list"
    path: ./ruleset/apple.mrs

  bilibili:
    <<: *domain_mrs
    url: "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Bilibili.list"
    path: ./ruleset/bilibili.mrs

  china-media:
    <<: *domain_mrs
    url: "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaMedia.list"
    path: ./ruleset/china-media.mrs

  china-domain:
    <<: *domain_mrs
    url: "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list"
    path: ./ruleset/china-domain.mrs

  # 代理規則
  gfwlist:
    <<: *domain_mrs
    url: "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyGFWlist.list"
    path: ./ruleset/gfwlist.mrs

  cloudflare:
    <<: *domain_mrs
    url: "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Cloudflare/Cloudflare.list"
    path: ./ruleset/cloudflare.mrs

  openai:
    <<: *domain_mrs
    url: "https://gist.githubusercontent.com/ddgksf2013/cb4121e8b5c5d865cc949cb8120320c4/raw/Ai.yaml"
    path: ./ruleset/openai.mrs

  global-media:
    <<: *domain_mrs
    url: "https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/GlobalMedia/GlobalMedia_Classical.yaml"
    path: ./ruleset/global-media.mrs

# ------------------------------------------------------------
# Rules（規則）
rules:
  # 廣告攔截
  - RULE-SET,ban-ad,REJECT
  - RULE-SET,ban-program-ad,REJECT
  
  # 直連規則
  - RULE-SET,lan,DIRECT
  - RULE-SET,google-cn,DIRECT
  - RULE-SET,apple,DIRECT
  - RULE-SET,bilibili,DIRECT
  - RULE-SET,china-media,DIRECT
  - RULE-SET,china-domain,DIRECT
  - GEOIP,CN,DIRECT
  
  # AI 服務
  - RULE-SET,openai,🤖 OpenAi
  
  # 媒體服務
  - RULE-SET,global-media,🎥 Media
  
  # 代理規則
  - RULE-SET,gfwlist,🚀 Global
  - RULE-SET,cloudflare,🚀 Global
  
  # 最終規則
  - MATCH,🐟 Final
