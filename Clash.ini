# Clash Meta / Mihomo 配置文件 (2026 精簡版)
# 最後更新：2026-03-15

# ------------------------------------------------------------
# 錨點區
ipcidr_mrs: &ipcidr_mrs { type: http, interval: 86400, behavior: ipcidr, format: mrs, proxy: DIRECT }
domain_mrs: &domain_mrs { type: http, interval: 86400, behavior: domain, format: mrs, proxy: DIRECT }

# URL 測試配置
u: &u
  type: url-test
  tolerance: 50
  url: https://www.gstatic.com/generate_204
  interval: 300
  lazy: true
  timeout: 5000
  include-all: true

# ------------------------------------------------------------
# 基礎配置
mixed-port: 7890
allow-lan: true
mode: rule
log-level: info
external-controller: 0.0.0.0:9090

# Geo 數據庫
geodata-mode: false
geodata-loader: memconservative
geox-url:
  geoip: "https://jsd.onmicrosoft.cn/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
  geosite: "https://jsd.onmicrosoft.cn/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
  mmdb: "https://jsd.onmicrosoft.cn/gh/MetaCubeX/meta-rules-dat@release/geoip.metadb"

# DNS 配置
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver:
    - 223.5.5.5
    - 8.8.8.8
  nameserver:
    - "https://doh.cmliussss.net/CMLiussss"
  proxy-server-nameserver:
    - "https://doh.cmliussss.net/CMLiussss"
  direct-nameserver:
    - "quic://dns.alidns.com"

# TUN 配置
tun:
  enable: true
  stack: gvisor
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53
  device: mihomo
  mtu: 1500

# ------------------------------------------------------------
# Proxy Groups（代理群組）
proxy-groups:
  # 主選擇群組
  - { name: 🚀 Global, type: select, proxies: [♻️ AUTO, HK, JP, KR, SG, TW, US, MY, DIRECT] }

  - { name: 🎥 Media, type: select, proxies: [🚀 Global, ♻️ AUTO, HK, JP, KR, SG, TW, US, MY, DIRECT] }

  - { name: 🤖 AI, type: select, proxies: [🚀 Global, ♻️ AUTO, HK, JP, KR, SG, TW, US, MY, DIRECT] }

  - { name: Telegram, type: select, proxies: [🚀 Global, ♻️ AUTO, HK, JP, KR, SG, TW, US, MY, DIRECT] }

  - { name: 🐟 Final, type: select, proxies: [🚀 Global, ♻️ AUTO, DIRECT, HK, JP, KR, SG, TW, US, MY] }

  # 自動選擇
  - { name: ♻️ AUTO, <<: *u, type: url-test, proxies: [HK, JP, KR, SG, TW, US, MY] }

  # 隱藏式地區分組（英文）
  - { name: HK, <<: *u, hidden: true, filter: "(🇭🇰|港|HK|hk|Hong Kong|HongKong|hongkong|HKG)" }
  - { name: JP, <<: *u, hidden: true, filter: "(🇯🇵|日本 | 川日 | 东京 | 大阪 | 泉日 | 埼玉 | 沪日 | 深日 | [^-] 日|JP|Japan|Tokyo|NRT|KIX)" }
  - { name: KR, <<: *u, hidden: true, filter: "(🇰🇷|KR|Korea|KOR|Seoul|首尔 | 春川 | 韩 | 韩|ICN)" }
  - { name: SG, <<: *u, hidden: true, filter: "(🇸🇬|新加坡 | 坡 | 狮城|SG|Singapore|SIN)" }
  - { name: TW, <<: *u, hidden: true, filter: "(🇹🇼|台 | 新北 | 彰化|TW|Taiwan|TPE|KHH)" }
  - { name: US, <<: *u, hidden: true, filter: "(🇺🇲|美 | 波特兰 | 达拉斯 | 俄勒冈 | 凤凰城 | 费利蒙 | 硅谷 | 拉斯韦加斯 | 洛杉矶 | 圣何塞 | 圣克拉拉 | 西雅图 | 芝加哥|US|United States|ATL|BUF|DFW|EWR|IAD|LAX|MCI|MIA|ORD|PHX|PDX|SEA|SJC)" }
  - { name: MY, <<: *u, hidden: true, filter: "(🇲🇾|马来西亚 | 馬來西亞 | 吉隆坡|MY|Malaysia|KUL)" }

# ------------------------------------------------------------
# Rule Providers（規則提供者）
rule-providers:
  # 廣告
  ban-ad:
    <<: *domain_mrs
    url: "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanAD.list"
    path: ./ruleset/ban-ad.mrs

  # 媒體
  netflix:
    <<: *domain_mrs
    url: "https://jsd.onmicrosoft.cn/gh/peiyingyao/Rule-for-OCD@master/rule/Clash/Netflix/Netflix_OCD_Domain.mrs"
    path: ./ruleset/netflix.mrs
  youtube:
    <<: *domain_mrs
    url: "https://jsd.onmicrosoft.cn/gh/peiyingyao/Rule-for-OCD@master/rule/Clash/YouTube/YouTube_OCD_Domain.mrs"
    path: ./ruleset/youtube.mrs
  disney:
    <<: *domain_mrs
    url: "https://jsd.onmicrosoft.cn/gh/peiyingyao/Rule-for-OCD@master/rule/Clash/Disney/Disney_OCD_Domain.mrs"
    path: ./ruleset/disney.mrs
  spotify:
    <<: *domain_mrs
    url: "https://jsd.onmicrosoft.cn/gh/peiyingyao/Rule-for-OCD@master/rule/Clash/Spotify/Spotify_OCD_Domain.mrs"
    path: ./ruleset/spotify.mrs
  hbo:
    <<: *domain_mrs
    url: "https://jsd.onmicrosoft.cn/gh/peiyingyao/Rule-for-OCD@master/rule/Clash/HBO/HBO_OCD_Domain.mrs"
    path: ./ruleset/hbo.mrs

  # AI
  openai:
    <<: *domain_mrs
    url: "https://jsd.onmicrosoft.cn/gh/peiyingyao/Rule-for-OCD@master/rule/Clash/OpenAI/OpenAI_OCD_Domain.mrs"
    path: ./ruleset/openai.mrs
  claude:
    <<: *domain_mrs
    url: "https://jsd.onmicrosoft.cn/gh/peiyingyao/Rule-for-OCD@master/rule/Clash/Claude/Claude_OCD_Domain.mrs"
    path: ./ruleset/claude.mrs
  gemini:
    <<: *domain_mrs
    url: "https://jsd.onmicrosoft.cn/gh/peiyingyao/Rule-for-OCD@master/rule/Clash/Gemini/Gemini_OCD_Domain.mrs"
    path: ./ruleset/gemini.mrs

  # Telegram
  telegram:
    <<: *domain_mrs
    url: "https://jsd.onmicrosoft.cn/gh/peiyingyao/Rule-for-OCD@master/rule/Clash/Telegram/Telegram_OCD_Domain.mrs"
    path: ./ruleset/telegram.mrs

  # 中國直連
  china:
    <<: *domain_mrs
    url: "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list"
    path: ./ruleset/china.mrs

  # 私有網絡
  private:
    <<: *ipcidr_mrs
    url: "https://jsd.onmicrosoft.cn/gh/peiyingyao/Rule-for-OCD@master/rule/Clash/Private/Private_OCD_IP.mrs"
    path: ./ruleset/private.mrs

# ------------------------------------------------------------
# Rules（規則）
rules:
  # 廣告攔截
  - RULE-SET,ban-ad,REJECT

  # 媒體服務
  - RULE-SET,netflix,🎥 Media
  - RULE-SET,youtube,🎥 Media
  - RULE-SET,disney,🎥 Media
  - RULE-SET,spotify,🎥 Media
  - RULE-SET,hbo,🎥 Media

  # AI 服務
  - RULE-SET,openai,🤖 AI
  - RULE-SET,claude,🤖 AI
  - RULE-SET,gemini,🤖 AI

  # Telegram
  - RULE-SET,telegram,Telegram

  # 中國直連
  - RULE-SET,china,DIRECT
  - RULE-SET,private,DIRECT
  - GEOIP,CN,DIRECT

  # 最終規則
  - MATCH,🐟 Final
