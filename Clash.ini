# Clash Meta 配置文件 (完整規則版)
# 最後更新：2026-03-15
# 規則每日自動更新 (86400 秒)

# ------------------------------------------------------------
# 基礎配置
mixed-port: 7890
allow-lan: true
mode: rule
log-level: info
external-controller: 0.0.0.0:9090

# DNS 配置
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - 223.5.5.5
    - 8.8.8.8
    - https://doh.cmliussss.net/CMLiussss

# ------------------------------------------------------------
# Proxy Groups（代理群組）
proxy-groups:
  - name: 🚀 Global
    type: select
    proxies:
      - ♻️ AUTO
      - HK
      - JP
      - KR
      - SG
      - TW
      - US
      - MY
      - DIRECT

  - name: 🎥 Media
    type: select
    proxies:
      - 🚀 Global
      - ♻️ AUTO
      - HK
      - JP
      - KR
      - SG
      - TW
      - US
      - MY
      - DIRECT

  - name: 🤖 AI
    type: select
    proxies:
      - 🚀 Global
      - ♻️ AUTO
      - HK
      - JP
      - KR
      - SG
      - TW
      - US
      - MY
      - DIRECT

  - name: Telegram
    type: select
    proxies:
      - 🚀 Global
      - ♻️ AUTO
      - HK
      - JP
      - KR
      - SG
      - TW
      - US
      - MY
      - DIRECT

  - name: 🐟 Final
    type: select
    proxies:
      - 🚀 Global
      - ♻️ AUTO
      - DIRECT
      - HK
      - JP
      - KR
      - SG
      - TW
      - US
      - MY

  - name: ♻️ AUTO
    type: url-test
    proxies:
      - HK
      - JP
      - KR
      - SG
      - TW
      - US
      - MY
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: HK
    type: url-test
    proxies: []
    filter: "(🇭🇰|港|HK|hk|Hong Kong|HongKong|hongkong|HKG)"
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: JP
    type: url-test
    proxies: []
    filter: "(🇯🇵|日本 | 川日 | 东京 | 大阪 | 泉日 | 埼玉 | 沪日 | 深日 | [^-] 日|JP|Japan|Tokyo|NRT|KIX)"
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: KR
    type: url-test
    proxies: []
    filter: "(🇰🇷|KR|Korea|KOR|Seoul|首尔 | 春川 | 韩 | 韩|ICN)"
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: SG
    type: url-test
    proxies: []
    filter: "(🇸🇬|新加坡 | 坡 | 狮城|SG|Singapore|SIN)"
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: TW
    type: url-test
    proxies: []
    filter: "(🇹🇼|台 | 新北 | 彰化|TW|Taiwan|TPE|KHH)"
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: US
    type: url-test
    proxies: []
    filter: "(🇺🇲|美 | 波特兰 | 达拉斯 | 俄勒冈 | 凤凰城 | 费利蒙 | 硅谷 | 拉斯韦加斯 | 洛杉矶 | 圣何塞 | 圣克拉拉 | 西雅图 | 芝加哥|US|United States|ATL|BUF|DFW|EWR|IAD|LAX|MCI|MIA|ORD|PHX|PDX|SEA|SJC)"
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: MY
    type: url-test
    proxies: []
    filter: "(🇲🇾|马来西亚 | 馬來西亞 | 吉隆坡|MY|Malaysia|KUL)"
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

